<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>snitchswipe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>

<body>
    <!-- App Container -->
    <div id="app">
        <!-- Header -->
        <header class="top-nav" style="position: relative;">
            <h1>SnitchSwipe</h1>
            <p class="subtitle">You Wish This Was Tinder ;)</p>
            <button onclick="resetSession()" style="position: absolute; top: 15px; right: 15px; background: transparent; border: none; font-size: 1.5rem; cursor: pointer; color: var(--accent-cyan); z-index: 100;" title="Restart Swiping">↻</button>
        </header>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- 1. Swipe View -->
            <section id="swipe-view" class="view active">
                <div class="question-header">
                    <h3 id="current-question-text">Loading question...</h3>
                </div>

                <div class="card-container" id="card-stack">
                    <!-- Cards injected via JS -->
                </div>

                <div class="swipe-status">
                    <p id="cards-left-text"></p>
                </div>

                <div class="action-buttons">
                    <button class="action-btn x-btn" id="btn-no" title="No"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                    <button class="action-btn heart-btn" id="btn-yes" title="Yes"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></button>
                </div>
            </section>

            <!-- 2. End Screen View -->
            <section id="end-view" class="view hidden">
                <div class="end-content">
                    <h2>You're all out!</h2>
                    <p>You've rated everyone.</p>
                    <button class="primary-btn" onclick="switchTab('leaderboard')">Check Leaderboard</button>
                    <br><br>
                    <button class="primary-btn" style="background: transparent; border: 2px solid var(--accent-pink);" onclick="resetSession()">Start Over ↻</button>
                </div>
            </section>

            <!-- 3. Leaderboard View -->
            <section id="leaderboard-view" class="view hidden">
                <div class="leaderboard-header">
                    <h2 style="display:flex; align-items:center; gap:8px;">Leaderboard <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent-gold)"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg></h2>
                    <h2 id="lb-subtitle" class="lb-subtitle">Overall Standings</h2>
                </div>
                
                <div class="traits-filter-container" id="traits-filter">
                    <!-- Pills injected via JS -->
                </div>

                <div class="leaderboard-list" id="leaderboard-list">
                    <!-- Leaderboard items injected via JS -->
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-btn active" id="nav-swipe" onclick="switchTab('swipe')">
                <span class="icon">↔</span>
                <span>Swipe</span>
            </button>
            <button class="nav-btn" id="nav-leaderboard" onclick="switchTab('leaderboard')">
                <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg></span>
                <span>Rankings</span>
            </button>
        </nav>
    </div>

    <!-- Application Script -->
    <script src="pixelTransition.js"></script>
    <script src="app.js"></script>
</body>

</html>
